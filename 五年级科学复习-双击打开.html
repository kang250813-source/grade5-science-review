<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五年级下册科学 · 互动复习</title>
  <style>
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --text: #1a2332;
  --text-muted: #5a6a7e;
  --primary: #2563eb;
  --primary-light: #dbeafe;
  --primary-dark: #1d4ed8;
  --success: #059669;
  --success-light: #d1fae5;
  --warning: #d97706;
  --warning-light: #fef3c7;
  --danger: #dc2626;
  --danger-light: #fee2e2;
  --unit1: #10b981;
  --unit2: #3b82f6;
  --unit3: #8b5cf6;
  --unit4: #f59e0b;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
  --font: system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.app { min-height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header {
  background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #06b6d4 100%);
  color: white;
  padding: 1rem 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-lg);
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 1rem;
}

.logo { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
.logo-icon { font-size: 2rem; }
.logo h1 { font-size: 1.25rem; font-weight: 900; line-height: 1.2; }
.logo p { font-size: 0.75rem; opacity: 0.85; }

.nav { display: flex; flex-wrap: wrap; gap: 0.35rem; flex: 1; justify-content: center; }

.nav-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  padding: 0.45rem 0.9rem;
  border-radius: 999px;
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-btn:hover { background: rgba(255,255,255,0.28); }
.nav-btn.active { background: white; color: var(--primary); font-weight: 700; }

.progress-badge {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.8rem;
  flex-shrink: 0;
}

.progress-label { white-space: nowrap; }
.progress-bar {
  width: 80px;
  height: 8px;
  background: rgba(255,255,255,0.3);
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #fbbf24;
  border-radius: 999px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text { font-weight: 700; min-width: 2.5rem; }

/* Main */
.main {
  flex: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem;
  width: 100%;
}

.view { display: none; animation: fadeIn 0.3s ease; }
.view.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.hidden { display: none !important; }

/* Hero */
.hero {
  text-align: center;
  padding: 2rem 1rem;
  margin-bottom: 1.5rem;
}

.hero h2 {
  font-size: 1.75rem;
  font-weight: 900;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #1e40af, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p { color: var(--text-muted); max-width: 540px; margin: 0 auto; }

/* Unit cards */
.unit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1.25rem;
  margin-bottom: 2rem;
}

.unit-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.5rem;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border-top: 4px solid;
  position: relative;
  overflow: hidden;
}

.unit-card::after {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  opacity: 0.08;
  background: currentColor;
}

.unit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.unit-card .unit-num { font-size: 2.5rem; font-weight: 900; opacity: 0.15; line-height: 1; }
.unit-card h3 { font-size: 1.1rem; font-weight: 700; margin: 0.25rem 0; }
.unit-card p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }
.unit-card .unit-topics { font-size: 0.8rem; color: var(--text-muted); }
.unit-card .unit-progress {
  margin-top: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.8rem;
  font-weight: 600;
}

.unit-card[data-unit="0"] { border-color: var(--unit1); color: var(--unit1); }
.unit-card[data-unit="1"] { border-color: var(--unit2); color: var(--unit2); }
.unit-card[data-unit="2"] { border-color: var(--unit3); color: var(--unit3); }
.unit-card[data-unit="3"] { border-color: var(--unit4); color: var(--unit4); }

/* Stats */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1rem;
}

.stat-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 1.25rem;
  text-align: center;
  box-shadow: var(--shadow);
}

.stat-card .stat-num {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary);
}

.stat-card .stat-label { font-size: 0.85rem; color: var(--text-muted); }

/* Toolbar */
.view-toolbar {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
  align-items: center;
}

.select, .search {
  font-family: var(--font);
  padding: 0.6rem 1rem;
  border: 2px solid #e2e8f0;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  background: var(--surface);
  transition: border-color 0.2s;
}

.select:focus, .search:focus {
  outline: none;
  border-color: var(--primary);
}

.search { flex: 1; min-width: 180px; }

/* Topic list */
.topic-list { display: flex; flex-direction: column; gap: 1rem; }

.topic-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.topic-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.topic-header:hover { background: #f8fafc; }

.topic-header h3 {
  font-size: 1rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.topic-header .topic-badge {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 999px;
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}

.topic-header .chevron {
  transition: transform 0.3s;
  font-size: 1.2rem;
  color: var(--text-muted);
}

.topic-card.open .chevron { transform: rotate(180deg); }

.topic-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}

.topic-card.open .topic-body { max-height: 2000px; }

.topic-content { padding: 0 1.25rem 1.25rem; }

.point-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }

.point-list li {
  display: flex;
  gap: 0.6rem;
  font-size: 0.92rem;
  line-height: 1.55;
  padding: 0.6rem 0.8rem;
  background: #f8fafc;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--primary);
}

.point-list li::before {
  content: '💡';
  flex-shrink: 0;
}

.topic-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.75rem;
}

.btn-done {
  font-family: var(--font);
  font-size: 0.8rem;
  padding: 0.35rem 0.75rem;
  border-radius: 999px;
  border: 2px solid var(--success);
  background: transparent;
  color: var(--success);
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-done:hover { background: var(--success-light); }
.btn-done.completed { background: var(--success); color: white; }

/* Flashcard */
.flash-counter { font-weight: 700; color: var(--text-muted); margin-left: auto; }

.flashcard-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  padding: 1rem 0;
}

.flashcard {
  width: 100%;
  max-width: 520px;
  height: 280px;
  perspective: 1000px;
  cursor: pointer;
}

.flashcard-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.5s;
  transform-style: preserve-3d;
}

.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }

.flashcard-front, .flashcard-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
  box-shadow: var(--shadow-lg);
}

.flashcard-front {
  background: linear-gradient(145deg, #1e40af, #3b82f6);
  color: white;
}

.flashcard-back {
  background: var(--surface);
  transform: rotateY(180deg);
  border: 3px solid var(--primary);
}

.flash-tag {
  font-size: 0.75rem;
  background: rgba(255,255,255,0.2);
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  margin-bottom: 1rem;
}

.flashcard-front h3 { font-size: 1.2rem; font-weight: 700; line-height: 1.5; }
.flash-hint { font-size: 0.8rem; opacity: 0.7; margin-top: 1.5rem; }
.flashcard-back p { font-size: 1rem; line-height: 1.7; color: var(--text); }

.flash-controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }

/* Buttons */
.btn {
  font-family: var(--font);
  padding: 0.6rem 1.25rem;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: #e2e8f0; color: var(--text); }
.btn-secondary:hover { background: #cbd5e1; }
.btn-lg { padding: 0.85rem 2rem; font-size: 1rem; }

/* Quiz */
.quiz-setup { text-align: center; padding: 2rem 1rem; }
.quiz-setup h2 { margin-bottom: 1.5rem; font-size: 1.5rem; }

.quiz-options {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  justify-content: center;
  margin-bottom: 2rem;
}

.quiz-opt {
  padding: 0.75rem 1.25rem;
  border: 2px solid #e2e8f0;
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.9rem;
  font-weight: 500;
  transition: all 0.2s;
}

.quiz-opt.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); font-weight: 700; }

.quiz-active { max-width: 640px; margin: 0 auto; }

.quiz-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 1.5rem;
  font-weight: 600;
  color: var(--text-muted);
}

.quiz-question {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.5rem;
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow);
  line-height: 1.6;
}

.quiz-choices { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }

.quiz-choice {
  padding: 0.85rem 1.1rem;
  border: 2px solid #e2e8f0;
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.95rem;
  text-align: left;
  transition: all 0.2s;
}

.quiz-choice:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-light); }
.quiz-choice.correct { border-color: var(--success); background: var(--success-light); }
.quiz-choice.wrong { border-color: var(--danger); background: var(--danger-light); }
.quiz-choice:disabled { cursor: default; }

.quiz-feedback {
  padding: 1rem;
  border-radius: var(--radius-sm);
  margin-bottom: 1rem;
  font-size: 0.9rem;
  line-height: 1.5;
}

.quiz-feedback.correct-fb { background: var(--success-light); color: var(--success); }
.quiz-feedback.wrong-fb { background: var(--danger-light); color: var(--danger); }

.quiz-result { display: flex; justify-content: center; padding: 2rem; }

.result-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 2.5rem;
  text-align: center;
  box-shadow: var(--shadow-lg);
  max-width: 400px;
  width: 100%;
}

.result-emoji { font-size: 4rem; margin-bottom: 0.5rem; }
.result-score { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 0.5rem 0; }
.result-actions { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }

/* Play */
.play-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}

.play-tab {
  font-family: var(--font);
  padding: 0.6rem 1rem;
  border: 2px solid #e2e8f0;
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.2s;
}

.play-tab.active { border-color: var(--primary); background: var(--primary-light); font-weight: 700; }

.play-panel { display: none; }
.play-panel.active { display: block; animation: fadeIn 0.3s ease; }

.play-desc { color: var(--text-muted); margin-bottom: 1.25rem; font-size: 0.9rem; }

.timeline-slots, .chain-slots {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1rem;
  min-height: 60px;
  padding: 0.75rem;
  background: #e2e8f0;
  border-radius: var(--radius-sm);
  border: 2px dashed #94a3b8;
}

.timeline-pool, .chain-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.drag-item {
  padding: 0.5rem 0.85rem;
  background: var(--surface);
  border: 2px solid var(--primary);
  border-radius: var(--radius-sm);
  cursor: grab;
  font-size: 0.85rem;
  font-weight: 600;
  user-select: none;
  transition: transform 0.15s, box-shadow 0.15s;
}

.drag-item:active { cursor: grabbing; transform: scale(1.05); box-shadow: var(--shadow); }
.drag-item.placed { border-color: #94a3b8; }
.drag-item.correct-item { border-color: var(--success); background: var(--success-light); }
.drag-item.wrong-item { border-color: var(--danger); background: var(--danger-light); }

.slot-num {
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 36px;
  height: 36px;
  background: #94a3b8;
  color: white;
  border-radius: 50%;
  font-size: 0.8rem;
  font-weight: 700;
  flex-shrink: 0;
}

.chain-scenario {
  background: var(--primary-light);
  padding: 0.75rem 1rem;
  border-radius: var(--radius-sm);
  margin-bottom: 1rem;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--primary-dark);
}

.play-actions { display: flex; gap: 0.75rem; margin-bottom: 1rem; }

.play-feedback {
  padding: 0.85rem 1rem;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.9rem;
  min-height: 2.5rem;
}

.play-feedback.success { background: var(--success-light); color: var(--success); }
.play-feedback.error { background: var(--danger-light); color: var(--danger); }

.match-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}

@media (max-width: 600px) {
  .match-grid { grid-template-columns: 1fr; }
}

.match-col { display: flex; flex-direction: column; gap: 0.5rem; }

.match-item {
  padding: 0.75rem 1rem;
  border: 2px solid #e2e8f0;
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
  line-height: 1.4;
}

.match-item:hover { border-color: var(--primary); }
.match-item.selected { border-color: var(--primary); background: var(--primary-light); font-weight: 600; }
.match-item.matched { border-color: var(--success); background: var(--success-light); cursor: default; opacity: 0.7; }
.match-item.wrong-flash { animation: shake 0.4s; border-color: var(--danger); }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* Footer */
.footer {
  text-align: center;
  padding: 1.5rem;
  color: var(--text-muted);
  font-size: 0.8rem;
  border-top: 1px solid #e2e8f0;
}

@media (max-width: 768px) {
  .header-inner { flex-direction: column; align-items: stretch; }
  .nav { justify-content: flex-start; }
  .progress-badge { justify-content: center; }
  .hero h2 { font-size: 1.4rem; }
}

</style>
  
  
  
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🔬</span>
          <div>
            <h1>五年级下册科学</h1>
            <p>教科版 · 互动复习课件</p>
          </div>
        </div>
        <nav class="nav" id="mainNav">
          <button class="nav-btn active" data-view="home">首页</button>
          <button class="nav-btn" data-view="learn">知识点</button>
          <button class="nav-btn" data-view="flashcard">闪卡</button>
          <button class="nav-btn" data-view="quiz">测验</button>
          <button class="nav-btn" data-view="play">趣味互动</button>
        </nav>
        <div class="progress-badge" id="progressBadge">
          <span class="progress-label">学习进度</span>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <span class="progress-text" id="progressText">0%</span>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- 首页 -->
      <section class="view active" id="view-home">
        <div class="hero">
          <h2>欢迎来复习科学！</h2>
          <p>本课件涵盖四个单元共 26 个知识点，支持阅读、闪卡记忆、选择题测验和趣味互动。</p>
        </div>
        <div class="unit-grid" id="unitGrid"></div>
        <div class="stats-row" id="statsRow"></div>
      </section>

      <!-- 知识点 -->
      <section class="view" id="view-learn">
        <div class="view-toolbar">
          <select id="learnUnitSelect" class="select"></select>
          <input type="search" id="learnSearch" class="search" placeholder="搜索知识点…">
        </div>
        <div class="topic-list" id="topicList"></div>
      </section>

      <!-- 闪卡 -->
      <section class="view" id="view-flashcard">
        <div class="view-toolbar">
          <select id="flashUnitSelect" class="select"></select>
          <span class="flash-counter" id="flashCounter">1 / 1</span>
        </div>
        <div class="flashcard-area">
          <div class="flashcard" id="flashcard">
            <div class="flashcard-inner">
              <div class="flashcard-front">
                <span class="flash-tag" id="flashTag">单元</span>
                <h3 id="flashQuestion">问题</h3>
                <p class="flash-hint">点击卡片查看答案</p>
              </div>
              <div class="flashcard-back">
                <p id="flashAnswer">答案</p>
              </div>
            </div>
          </div>
          <div class="flash-controls">
            <button class="btn btn-secondary" id="flashPrev">← 上一张</button>
            <button class="btn btn-primary" id="flashKnow">我会了 ✓</button>
            <button class="btn btn-secondary" id="flashNext">下一张 →</button>
          </div>
        </div>
      </section>

      <!-- 测验 -->
      <section class="view" id="view-quiz">
        <div id="quizSetup" class="quiz-setup">
          <h2>选择测验范围</h2>
          <div class="quiz-options" id="quizOptions"></div>
          <button class="btn btn-primary btn-lg" id="startQuiz">开始测验</button>
        </div>
        <div id="quizActive" class="quiz-active hidden">
          <div class="quiz-header">
            <span id="quizProgress">第 1 / 10 题</span>
            <span id="quizScore">得分：0</span>
          </div>
          <div class="quiz-question" id="quizQuestion"></div>
          <div class="quiz-choices" id="quizChoices"></div>

</script>
  <script>
(function () {
  'use strict';

  const STORAGE_KEY = 'science-review-progress';

  let state = {
    completedTopics: [],
    knownFlashcards: [],
    currentView: 'home',
    flashIndex: 0,
    flashUnit: 'all',
    quizQuestions: [],
    quizIndex: 0,
    quizScore: 0,
    quizWrong: [],
    selectedQuizUnits: ['all'],
    chainIndex: 0,
    matchSelected: null,
    matchPairs: []
  };

  function loadProgress() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved) {
        state.completedTopics = saved.completedTopics || [];
        state.knownFlashcards = saved.knownFlashcards || [];
      }
    } catch (_) { /* ignore */ }
  }

  function saveProgress() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completedTopics: state.completedTopics,
      knownFlashcards: state.knownFlashcards
    }));
    updateProgressUI();
  }

  function $(sel) { return document.querySelector(sel); }
  function $$(sel) { return document.querySelectorAll(sel); }

  function switchView(view) {
    state.currentView = view;
    $$('.view').forEach(v => v.classList.remove('active'));
    $$('.nav-btn').forEach(b => b.classList.remove('active'));
    $(`#view-${view}`).classList.add('active');
    $(`.nav-btn[data-view="${view}"]`).classList.add('active');
  }

  function updateProgressUI() {
    const totalTopics = getAllTopicIds().length;
    const completed = state.completedTopics.length;
    const pct = totalTopics ? Math.round((completed / totalTopics) * 100) : 0;
    $('#progressFill').style.width = pct + '%';
    $('#progressText').textContent = pct + '%';
  }

  /* ── Home ── */
  function renderHome() {
    const grid = $('#unitGrid');
    grid.innerHTML = UNITS.map((unit, i) => {
      const done = unit.topics.filter(t => state.completedTopics.includes(t.id)).length;
      const total = unit.topics.length;
      return `
        <div class="unit-card" data-unit="${i}">
          <div class="unit-num">${i + 1}</div>
          <h3>${unit.emoji} ${unit.title}</h3>
          <p>${total} 个知识点</p>
          <div class="unit-topics">${unit.topics.map(t => t.title).join(' · ')}</div>
          <div class="unit-progress">
            <span>已学 ${done}/${total}</span>
          </div>
        </div>`;
    }).join('');

    grid.querySelectorAll('.unit-card').forEach(card => {
      card.addEventListener('click', () => {
        const idx = +card.dataset.unit;
        switchView('learn');
        $('#learnUnitSelect').value = idx;
        renderTopics();
      });
    });

    const totalTopics = getAllTopicIds().length;
    const totalPoints = getTotalPoints();
    $('#statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-num">4</div><div class="stat-label">单元</div></div>
      <div class="stat-card"><div class="stat-num">${totalTopics}</div><div class="stat-label">知识点</div></div>
      <div class="stat-card"><div class="stat-num">${totalPoints}</div><div class="stat-label">要点</div></div>
      <div class="stat-card"><div class="stat-num">${QUIZ_QUESTIONS.length}</div><div class="stat-label">测验题</div></div>`;
  }

  /* ── Learn ── */
  function initLearnSelect() {
    const sel = $('#learnUnitSelect');
    sel.innerHTML = '<option value="all">全部单元</option>' +
      UNITS.map((u, i) => `<option value="${i}">${u.title}</option>`).join('');
    sel.addEventListener('change', renderTopics);
    $('#learnSearch').addEventListener('input', renderTopics);
  }

  function renderTopics() {
    const unitVal = $('#learnUnitSelect').value;
    const search = $('#learnSearch').value.trim().toLowerCase();
    const list = $('#topicList');
    let html = '';

    UNITS.forEach((unit, ui) => {
      if (unitVal !== 'all' && +unitVal !== ui) return;
      unit.topics.forEach(topic => {
        const text = (topic.title + ' ' + topic.points.join(' ')).toLowerCase();
        if (search && !text.includes(search)) return;
        const done = state.completedTopics.includes(topic.id);
        html += `
          <div class="topic-card" data-id="${topic.id}">
            <div class="topic-header">
              <h3><span class="topic-badge">${unit.emoji} 单元${ui + 1}</span> ${topic.title}</h3>
              <span class="chevron">▼</span>
            </div>
            <div class="topic-body">
              <div class="topic-content">
                <ul class="point-list">
                  ${topic.points.map(p => `<li>${p}</li>`).join('')}
                </ul>
                <div class="topic-actions">
                  <button class="btn-done ${done ? 'completed' : ''}" data-id="${topic.id}">
                    ${done ? '✓ 已掌握' : '标记为已掌握'}
                  </button>
                </div>
              </div>
            </div>
          </div>`;
      });
    });

    list.innerHTML = html || '<p style="text-align:center;color:#5a6a7e;padding:2rem;">没有找到匹配的知识点</p>';

    list.querySelectorAll('.topic-header').forEach(h => {
      h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
    });

    list.querySelectorAll('.btn-done').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const idx = state.completedTopics.indexOf(id);
        if (idx >= 0) state.completedTopics.splice(idx, 1);
        else state.completedTopics.push(id);
        saveProgress();
        renderTopics();
        renderHome();
      });
    });
  }

  /* ── Flashcards ── */
  function initFlashSelect() {
    const sel = $('#flashUnitSelect');
    sel.innerHTML = '<option value="all">全部单元</option>' +
      UNITS.map((u, i) => `<option value="${i}">第${i + 1}单元</option>`).join('');
    sel.addEventListener('change', () => {
      state.flashUnit = sel.value;
      state.flashIndex = 0;
      renderFlashcard();
    });
  }

  function getFilteredFlashcards() {
    if (state.flashUnit === 'all') return FLASHCARDS;
    return FLASHCARDS.filter(c => c.unit === +state.flashUnit);
  }

  function renderFlashcard() {
    const cards = getFilteredFlashcards();
    if (!cards.length) return;
    if (state.flashIndex >= cards.length) state.flashIndex = 0;
    const card = cards[state.flashIndex];
    const fc = $('#flashcard');
    fc.classList.remove('flipped');

    $('#flashTag').textContent = UNITS[card.unit].title;
    $('#flashQuestion').textContent = card.q;
    $('#flashAnswer').textContent = card.a;
    $('#flashCounter').textContent = `${state.flashIndex + 1} / ${cards.length}`;
  }

  function setupFlashControls() {
    $('#flashcard').addEventListener('click', () => {
      $('#flashcard').classList.toggle('flipped');
    });

    $('#flashPrev').addEventListener('click', () => {
      const cards = getFilteredFlashcards();
      state.flashIndex = (state.flashIndex - 1 + cards.length) % cards.length;
      renderFlashcard();
    });

    $('#flashNext').addEventListener('click', () => {
      const cards = getFilteredFlashcards();
      state.flashIndex = (state.flashIndex + 1) % cards.length;
      renderFlashcard();
    });

    $('#flashKnow').addEventListener('click', () => {
      const cards = getFilteredFlashcards();
      const key = cards[state.flashIndex].q;
      if (!state.knownFlashcards.includes(key)) {
        state.knownFlashcards.push(key);
        saveProgress();
      }
      state.flashIndex = (state.flashIndex + 1) % cards.length;
      renderFlashcard();
    });
  }

  /* ── Quiz ── */
  function initQuizSetup() {
    const opts = $('#quizOptions');
    opts.innerHTML = `
      <button class="quiz-opt selected" data-unit="all">全部单元</button>
      ${UNITS.map((u, i) => `<button class="quiz-opt" data-unit="${i}">${u.emoji} 第${i + 1}单元</button>`).join('')}`;

    opts.querySelectorAll('.quiz-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.unit;
        if (val === 'all') {
          opts.querySelectorAll('.quiz-opt').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          state.selectedQuizUnits = ['all'];
        } else {
          opts.querySelector('[data-unit="all"]').classList.remove('selected');
          btn.classList.toggle('selected');
          const selected = [...opts.querySelectorAll('.quiz-opt.selected')].map(b => b.dataset.unit);
          state.selectedQuizUnits = selected.length ? selected : ['all'];
          if (!selected.length) opts.querySelector('[data-unit="all"]').classList.add('selected');
        }
      });
    });

    $('#startQuiz').addEventListener('click', startQuiz);
    $('#quizNext').addEventListener('click', nextQuizQuestion);
    $('#retryQuiz').addEventListener('click', () => {
      showQuizSection('setup');
    });
    $('#reviewWrong').addEventListener('click', () => {
      if (state.quizWrong.length) {
        state.quizQuestions = [...state.quizWrong];
        state.quizIndex = 0;
        state.quizScore = 0;
        state.quizWrong = [];
        showQuizSection('active');
        renderQuizQuestion();
      } else {
        showQuizSection('setup');
      }
    });
  }

  function getQuizPool() {
    if (state.selectedQuizUnits.includes('all')) return [...QUIZ_QUESTIONS];
    return QUIZ_QUESTIONS.filter(q => state.selectedQuizUnits.includes(String(q.unit)));
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startQuiz() {
    const pool = getQuizPool();
    state.quizQuestions = shuffle(pool).slice(0, Math.min(10, pool.length));
    state.quizIndex = 0;
    state.quizScore = 0;
    state.quizWrong = [];
    showQuizSection('active');
    renderQuizQuestion();
  }

  function showQuizSection(section) {
    $('#quizSetup').classList.toggle('hidden', section !== 'setup');
    $('#quizActive').classList.toggle('hidden', section !== 'active');
    $('#quizResult').classList.toggle('hidden', section !== 'result');
  }

  function renderQuizQuestion() {
    const q = state.quizQuestions[state.quizIndex];
    $('#quizProgress').textContent = `第 ${state.quizIndex + 1} / ${state.quizQuestions.length} 题`;
    $('#quizScore').textContent = `得分：${state.quizScore}`;
    $('#quizQuestion').textContent = q.q;
    $('#quizFeedback').classList.add('hidden');
    $('#quizNext').classList.add('hidden');

    const choices = $('#quizChoices');
    choices.innerHTML = q.options.map((opt, i) =>
      `<button class="quiz-choice" data-idx="${i}">${String.fromCharCode(65 + i)}. ${opt}</button>`
    ).join('');

    choices.querySelectorAll('.quiz-choice').forEach(btn => {
      btn.addEventListener('click', () => answerQuiz(+btn.dataset.idx));
    });
  }

  function answerQuiz(selected) {
    const q = state.quizQuestions[state.quizIndex];
    const correct = q.answer;
    const buttons = $$('#quizChoices .quiz-choice');

    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === correct) btn.classList.add('correct');
      else if (i === selected) btn.classList.add('wrong');
    });

    const fb = $('#quizFeedback');
    fb.classList.remove('hidden', 'correct-fb', 'wrong-fb');

    if (selected === correct) {
      state.quizScore++;
      fb.classList.add('correct-fb');
      fb.textContent = '✓ 回答正确！' + (q.explain ? ' ' + q.explain : '');
    } else {
      state.quizWrong.push(q);
      fb.classList.add('wrong-fb');
      fb.textContent = '✗ 正确答案是 ' + String.fromCharCode(65 + correct) + '。' + q.explain;
    }

    $('#quizScore').textContent = `得分：${state.quizScore}`;
    $('#quizNext').classList.remove('hidden');
    $('#quizNext').textContent = state.quizIndex + 1 >= state.quizQuestions.length ? '查看结果' : '下一题';
  }

  function nextQuizQuestion() {
    state.quizIndex++;
    if (state.quizIndex >= state.quizQuestions.length) {
      showQuizResult();
    } else {
      renderQuizQuestion();
    }
  }

  function showQuizResult() {
    showQuizSection('result');
    const total = state.quizQuestions.length;
    const score = state.quizScore;
    const pct = Math.round((score / total) * 100);

    $('#resultScore').textContent = `${score} / ${total}`;
    if (pct >= 90) {
      $('#resultEmoji').textContent = '🏆';
      $('#resultTitle').textContent = '太棒了！';
      $('#resultMessage').textContent = '你已经很好地掌握了这些知识，继续保持！';
    } else if (pct >= 70) {
      $('#resultEmoji').textContent = '🎉';
      $('#resultTitle').textContent = '不错哦！';
      $('#resultMessage').textContent = '大部分知识点已经掌握，再看看错题就更完美了。';
    } else if (pct >= 50) {
      $('#resultEmoji').textContent = '💪';
      $('#resultTitle').textContent = '继续加油！';
      $('#resultMessage').textContent = '还有一些知识点需要复习，建议先用闪卡记忆一遍。';
    } else {
      $('#resultEmoji').textContent = '📚';
      $('#resultTitle').textContent = '别灰心！';
      $('#resultMessage').textContent = '建议回到「知识点」模块仔细阅读，再用闪卡反复记忆。';
    }
  }

  /* ── Play: Timeline ── */
  function initTimeline() {
    resetTimeline();
    $('#checkTimeline').addEventListener('click', checkTimeline);
    $('#resetTimeline').addEventListener('click', resetTimeline);
  }

  function resetTimeline() {
    const shuffled = shuffle(SHIP_TIMELINE);
    const slots = $('#timelineSlots');
    const pool = $('#timelinePool');
    $('#timelineFeedback').textContent = '';
    $('#timelineFeedback').className = 'play-feedback';

    slots.innerHTML = SHIP_TIMELINE.map((_, i) =>
      `<span class="slot-num">${i + 1}</span>`
    ).join('');

    pool.innerHTML = shuffled.map((name, i) =>
      `<div class="drag-item" draggable="true" data-name="${name}" data-idx="${i}">${name}</div>`
    ).join('');

    setupDragDrop(slots, pool);
  }

  function checkTimeline() {
    const slots = $('#timelineSlots');
    const items = [...slots.querySelectorAll('.drag-item')];
    let allCorrect = items.length === SHIP_TIMELINE.length;
    items.forEach((item, i) => {
      const correct = item.dataset.name === SHIP_TIMELINE[i];
      item.classList.toggle('correct-item', correct);
      item.classList.toggle('wrong-item', !correct);
      if (!correct) allCorrect = false;
    });
    const fb = $('#timelineFeedback');
    if (allCorrect) {
      fb.className = 'play-feedback success';
      fb.textContent = '🎉 完全正确！你记住了船的发展顺序。';
    } else {
      fb.className = 'play-feedback error';
      fb.textContent = '还有些位置不对，绿色是正确的，红色需要调整。点击「重置」再试一次。';
    }
  }

  /* ── Play: Food Chain ── */
  function initFoodChain() {
    state.chainIndex = 0;
    renderFoodChain();
    $('#checkChain').addEventListener('click', checkFoodChain);
    $('#nextChain').addEventListener('click', () => {
      state.chainIndex = (state.chainIndex + 1) % FOOD_CHAINS.length;
      renderFoodChain();
    });
  }

  function renderFoodChain() {
    const chain = FOOD_CHAINS[state.chainIndex];
    $('#chainScenario').textContent = `📋 ${chain.name}`;
    const shuffled = shuffle(chain.items);
    const slots = $('#chainSlots');
    const pool = $('#chainPool');
    $('#chainFeedback').textContent = '';
    $('#chainFeedback').className = 'play-feedback';

    slots.innerHTML = chain.items.map((_, i) => {
      const labels = ['生产者', '初级消费者', '次级消费者', '顶级消费者'];
      return `<span class="slot-num" title="${labels[i] || ''}">${i + 1}</span>`;
    }).join('');

    pool.innerHTML = shuffled.map(name =>
      `<div class="drag-item" draggable="true" data-name="${name}">${name}</div>`
    ).join('');

    setupDragDrop(slots, pool);
  }

  function checkFoodChain() {
    const chain = FOOD_CHAINS[state.chainIndex];
    const slots = $('#chainSlots');
    const items = [...slots.querySelectorAll('.drag-item')];
    let allCorrect = items.length === chain.items.length;
    items.forEach((item, i) => {
      const correct = item.dataset.name === chain.items[i];
      item.classList.toggle('correct-item', correct);
      item.classList.toggle('wrong-item', !correct);
      if (!correct) allCorrect = false;
    });
    const fb = $('#chainFeedback');
    if (allCorrect) {
      fb.className = 'play-feedback success';
      fb.textContent = '🎉 正确！' + chain.items.join(' → ');
    } else {
      fb.className = 'play-feedback error';
      fb.textContent = '顺序还不对，提示：从生产者（植物）开始，到顶级消费者结束。';
    }
  }

  /* ── Play: Match ── */
  function initMatch() {
    resetMatch();
    $('#resetMatch').addEventListener('click', resetMatch);
  }

  function resetMatch() {
    state.matchSelected = null;
    state.matchPairs = shuffle(MATCH_PAIRS);
    const terms = $('#matchTerms');
    const defs = $('#matchDefs');
    $('#matchFeedback').textContent = '';
    $('#matchFeedback').className = 'play-feedback';

    const shuffledDefs = shuffle(state.matchPairs.map(p => p.def));
    terms.innerHTML = state.matchPairs.map((p, i) =>
      `<div class="match-item" data-side="term" data-idx="${i}">${p.term}</div>`
    ).join('');
    defs.innerHTML = shuffledDefs.map((d, i) =>
      `<div class="match-item" data-side="def" data-def="${d}">${d}</div>`
    ).join('');

    $$('.match-item').forEach(item => {
      item.addEventListener('click', () => handleMatchClick(item));
    });
  }

  function handleMatchClick(item) {
    if (item.classList.contains('matched')) return;

    if (!state.matchSelected) {
      state.matchSelected = item;
      item.classList.add('selected');
      return;
    }

    if (state.matchSelected === item) {
      item.classList.remove('selected');
      state.matchSelected = null;
      return;
    }

    if (state.matchSelected.dataset.side === item.dataset.side) {
      state.matchSelected.classList.remove('selected');
      state.matchSelected = item;
      item.classList.add('selected');
      return;
    }

    const termEl = state.matchSelected.dataset.side === 'term' ? state.matchSelected : item;
    const defEl = state.matchSelected.dataset.side === 'def' ? state.matchSelected : item;
    const pair = state.matchPairs[+termEl.dataset.idx];
    const correct = pair.def === defEl.dataset.def;

    if (correct) {
      termEl.classList.remove('selected');
      termEl.classList.add('matched');
      defEl.classList.add('matched');
      state.matchSelected = null;

      const remaining = $$('.match-item:not(.matched)').length;
      if (remaining === 0) {
        $('#matchFeedback').className = 'play-feedback success';
        $('#matchFeedback').textContent = '🎉 全部配对正确！概念掌握得很棒！';
      }
    } else {
      termEl.classList.add('wrong-flash');
      defEl.classList.add('wrong-flash');
      setTimeout(() => {
        termEl.classList.remove('wrong-flash', 'selected');
        defEl.classList.remove('wrong-flash', 'selected');
      }, 500);
      state.matchSelected = null;
    }
  }

  /* ── Drag & Drop ── */
  function setupDragDrop(slotsContainer, poolContainer) {
    let dragged = null;

    function onDragStart(e) {
      dragged = e.target;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => dragged.style.opacity = '0.5', 0);
    }

    function onDragEnd() {
      if (dragged) dragged.style.opacity = '1';
      dragged = null;
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function onDropSlot(e) {
      e.preventDefault();
      if (!dragged) return;
      const target = e.target.closest('.timeline-slots, .chain-slots') ? e.target : null;
      if (target && (target.classList.contains('drag-item') || target.classList.contains('slot-num') || target === slotsContainer)) {
        slotsContainer.appendChild(dragged);
        dragged.classList.add('placed');
      }
    }

    function onDropPool(e) {
      e.preventDefault();
      if (!dragged) return;
      poolContainer.appendChild(dragged);
      dragged.classList.remove('placed');
    }

    [poolContainer, slotsContainer].forEach(container => {
      container.addEventListener('dragover', onDragOver);
    });

    slotsContainer.addEventListener('drop', onDropSlot);
    poolContainer.addEventListener('drop', onDropPool);

    poolContainer.querySelectorAll('.drag-item').forEach(item => {
      item.addEventListener('dragstart', onDragStart);
      item.addEventListener('dragend', onDragEnd);
    });

    slotsContainer.addEventListener('dragstart', onDragStart);
    slotsContainer.addEventListener('dragend', onDragEnd);
  }

  /* ── Play tabs ── */
  function initPlayTabs() {
    $$('.play-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        $$('.play-tab').forEach(t => t.classList.remove('active'));
        $$('.play-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        $(`#play-${tab.dataset.play}`).classList.add('active');
      });
    });
  }

  /* ── Nav ── */
  function initNav() {
    $$('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchView(btn.dataset.view));
    });
  }

  /* ── Init ── */
  function init() {
    loadProgress();
    initNav();
    initLearnSelect();
    initFlashSelect();
    setupFlashControls();
    initQuizSetup();
    initTimeline();
    initFoodChain();
    initMatch();
    initPlayTabs();
    renderHome();
    renderTopics();
    renderFlashcard();
    updateProgressUI();
  }

  document.addEventListener('DOMContentLoaded', init);
})();

</script>
</body>
</html>
